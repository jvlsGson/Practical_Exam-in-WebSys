<title>https://pizza-form</title>
<h2>Pizza by Slice</h2>
<br>
<h3>Personal Details</h3>
<br>

</head>
<body>
<form>
  <label for="fname">Full name:</label><br>
  <input type="text" id="fname" name="fname" required><br>
  <label for="email">Email:</label><br>
  <input type="email" id="email" name="email" required><br>
  <label for="contact">Contact #:</label><br>
  <input type="tel" id="contact_number" name="contact_number" required><br>
  <label for="age" min=18 max=99 >Age :</label><br>
  <input type="number" id="age" name="age" required><br>

</form>
<h3>Pizza Size</h3>
<form>
  <label for="size1"><b>Small</b></label>
  <input type="radio" id="size1" name="size1">
  <label for="size2"><b>Medium</b></label>
  <input type="radio" id="size2" name="size2">
  <label for="size3"><b>Large</b></label>
  <input type="radio" id="size3" name="size3">
  <label for="age"><b>Extra Large</b></label>
  <input type="radio" id="age" name="age">


</form>

<p></p>

</body>
</html>
